services:
    sensor-publisher:
        build: .
        container_name: kafka_sensors
        command: python Sensores.py
        depends_on:
          kafka:
            condition: service_healthy

    parking-web-ui:
        build: .
        container_name: web_interface
        ports:
        - "5000:5000"
        command: python ParkingWeb.py
        # depends_on:
        #   - mongodb
    
    kafka:
        image: apache/kafka:latest
        container_name: kafka-test
        ports:
        - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        healthcheck:
            test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5

    nifi:
        image: apache/nifi:latest
        container_name: nifi-test
        ports:
            - "8443:8443" # Puerto HTTPS por si acaso
        environment:
            # Forzar modo HTTP sin usuario
            NIFI_WEB_HTTP_HOST: 0.0.0.0
            NIFI_WEB_HTTP_PORT: 8080
            # Credenciales de respaldo (Hadoop)
            SINGLE_USER_CREDENTIALS_USERNAME: hadoop
            SINGLE_USER_CREDENTIALS_PASSWORD: hadoophadoop
        volumes:
            - nifi-data:/opt/nifi/nifi-current/database_repository
        depends_on:
            kafka:
                condition: service_healthy
            #   mongodb:
            #     condition: service_healthy

volumes:
    nifi-data: